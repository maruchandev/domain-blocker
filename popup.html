<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 290px; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1a1a1a; background: #f8f9fa; font-size: 13px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #fff; border-bottom: 1px solid #e9ecef; }
    .header h1 { font-size: 14px; font-weight: 600; color: #212529; }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ced4da; border-radius: 20px; transition: .2s; }
    .slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 16px; height: 16px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .slider { background: #339af0; }
    .toggle input:checked + .slider::before { transform: translateX(16px); }
    .content { padding: 12px 16px; }
    .domain { font-size: 13px; font-weight: 500; color: #212529; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status { font-size: 11px; color: #868e96; margin-bottom: 14px; }
    .actions { display: flex; gap: 8px; }
    .btn { padding: 7px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; flex: 1; transition: background .15s; }
    .btn-primary { background: #339af0; color: #fff; }
    .btn-primary:hover { background: #228be6; }
    .btn-outline { background: #fff; color: #495057; border: 1px solid #dee2e6; }
    .btn-outline:hover { background: #f1f3f5; }
    .footer { padding: 10px 16px; border-top: 1px solid #e9ecef; text-align: center; }
    .footer a { font-size: 11px; color: #868e96; text-decoration: none; }
    .footer a:hover { color: #495057; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Domain Blocker</h1>
    <label class="toggle">
      <input type="checkbox" id="toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="content">
    <div class="domain" id="current-domain">Loading...</div>
    <div class="status" id="domain-status"></div>
    <div class="actions">
      <button class="btn" id="block-btn" style="display:none"></button>
    </div>
  </div>
  <div class="footer">
    <a href="#" id="options-link">Settings</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
