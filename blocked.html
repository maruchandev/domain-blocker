<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blocked</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f9fa; color: #212529; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .container { text-align: center; padding: 40px 20px; max-width: 420px; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #e03131; }
    p { font-size: 14px; color: #868e96; margin-bottom: 24px; line-height: 1.6; }
    .domain { font-size: 13px; color: #495057; background: #e9ecef; padding: 8px 14px; border-radius: 6px; display: inline-block; margin-bottom: 24px; word-break: break-all; }
    .btn { display: inline-block; padding: 10px 24px; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; background: #339af0; color: #fff; text-decoration: none; }
    .btn:hover { background: #228be6; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128274;</div>
    <h1>This page is blocked</h1>
    <p>Access to this site has been restricted by Domain Blocker.</p>
    <div class="domain" id="blocked-domain"></div>
    <br>
    <button class="btn" onclick="history.back()">Go back</button>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const domain = params.get("domain");
    if (domain) document.getElementById("blocked-domain").textContent = domain;
  </script>
</body>
</html>
