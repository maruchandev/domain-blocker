<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 680px; margin: 0 auto; padding: 32px 20px 80px; color: #212529; font-size: 14px; background: #f8f9fa; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; color: #212529; }
    .subtitle { color: #868e96; font-size: 13px; margin-bottom: 28px; }
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .toggle-label { font-weight: 500; font-size: 14px; color: #212529; }
    .toggle { position: relative; width: 40px; height: 22px; cursor: pointer; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #ced4da; border-radius: 22px; transition: .2s; }
    .slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 18px; height: 18px; background: #fff; border-radius: 50%; transition: .2s; }
    .toggle input:checked + .slider { background: #339af0; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .card { background: #fff; border: 1px solid #e9ecef; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; color: #495057; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 12px; }
    .input-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .input-row input { flex: 1; min-width: 140px; padding: 8px 12px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 13px; color: #212529; background: #fff; }
    .input-row input:focus { outline: none; border-color: #339af0; box-shadow: 0 0 0 3px rgba(51,154,240,0.1); }
    .input-row input.pin-input { max-width: 90px; text-align: center; font-size: 14px; letter-spacing: 4px; }
    .input-row button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; background: #339af0; color: #fff; transition: background .15s; }
    .input-row button:hover { background: #228be6; }
    .list-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f3f5; }
    .list-item:last-child { border-bottom: none; }
    .list-item .name { font-size: 13px; color: #212529; }
    .list-item .actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .btn-icon { background: none; border: none; cursor: pointer; color: #adb5bd; font-size: 18px; padding: 2px; line-height: 1; }
    .btn-icon:hover { color: #fa5252; }
    .hidden { display: none !important; }
    .empty-msg { color: #adb5bd; font-style: italic; font-size: 13px; padding: 6px 0; }
    .submit-status { font-size: 12px; margin-top: 6px; min-height: 18px; }
    .submit-status.ok { color: #2b8a3e; }
    .submit-status.err { color: #e03131; }
    .d-toggle { position: relative; width: 28px; height: 16px; flex-shrink: 0; cursor: pointer; display: inline-block; }
    .d-toggle input { opacity: 0; width: 0; height: 0; }
    .d-toggle .slider { position: absolute; inset: 0; background: #339af0; border-radius: 16px; transition: .15s; }
    .d-toggle .slider::before { content: ''; position: absolute; left: 2px; top: 2px; width: 12px; height: 12px; background: #fff; border-radius: 50%; transition: .15s; }
    .d-toggle input:not(:checked) + .slider { background: #ced4da; }
    .d-toggle input:not(:checked) + .slider::before { transform: translateX(12px); }
    .note { font-size: 12px; color: #868e96; margin-top: 8px; }
    .preset-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 6px; background: #f1f3f5; }
    .preset-item input[type="checkbox"] { accent-color: #339af0; width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .preset-item .preset-label { font-size: 13px; font-weight: 500; color: #212529; flex: 1; }
    .preset-item .preset-count { font-size: 11px; color: #868e96; flex-shrink: 0; }
    .pin-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .pin-modal { background: #fff; padding: 32px; border-radius: 12px; text-align: center; max-width: 320px; width: 90%; }
    .pin-modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .pin-modal p { font-size: 13px; color: #868e96; margin-bottom: 20px; }
    .pin-modal input { width: 140px; padding: 10px; border: 1px solid #dee2e6; border-radius: 6px; font-size: 18px; text-align: center; letter-spacing: 8px; outline: none; }
    .pin-modal input:focus { border-color: #339af0; box-shadow: 0 0 0 3px rgba(51,154,240,0.1); }
    .pin-modal .pin-error { color: #e03131; font-size: 13px; margin-top: 8px; min-height: 20px; }
  </style>
</head>
<body>
  <div id="pin-overlay" class="pin-overlay hidden">
    <div class="pin-modal">
      <h2>PIN required</h2>
      <p>Enter your 4-digit PIN to access settings</p>
      <input type="password" id="pin-field" maxlength="4" inputmode="numeric" autocomplete="off" placeholder="****">
      <div class="pin-error" id="pin-error"></div>
    </div>
  </div>

  <h1>Domain Blocker</h1>
  <p class="subtitle">Manage your blocklist</p>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="global-toggle">
      <span class="slider"></span>
    </label>
    <span class="toggle-label">Extension enabled</span>
  </div>

  <div class="card">
    <div class="card-title">Presets</div>
    <p class="note">Toggle categories to bulk-block popular services</p>
    <div id="preset-grid" style="margin-top:10px;display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <div class="card">
    <div class="card-title">Blocklist</div>
    <div class="input-row">
      <input type="text" id="blocklist-input" placeholder="e.g. example.com">
      <button id="blocklist-add-btn">Add</button>
    </div>
    <div id="blocklist-list"></div>
    <div class="submit-status" id="blocklist-status"></div>
  </div>

  <div class="card">
    <div class="card-title">Redirect</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <label class="toggle">
        <input type="checkbox" id="redirect-toggle">
        <span class="slider"></span>
      </label>
      <span style="font-size:13px;color:#495057">Redirect blocked requests</span>
    </div>
    <div class="input-row">
      <input type="text" id="redirect-url-input" placeholder="https://example.com/blocked">
      <button id="redirect-save-btn">Save</button>
    </div>
    <div class="submit-status" id="redirect-status"></div>
  </div>

  <div class="card">
    <div class="card-title">Change PIN</div>
    <p class="note">Default PIN is 0000</p>
    <div class="input-row" style="margin-top:8px">
      <input type="password" id="pin-new-change" class="pin-input" maxlength="4" inputmode="numeric" placeholder="New PIN">
      <input type="password" id="pin-confirm-change" class="pin-input" maxlength="4" inputmode="numeric" placeholder="Confirm">
      <button id="pin-change-btn">Change</button>
    </div>
    <div class="submit-status" id="pin-status-msg"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
